<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>post_seq — .seq from URL</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cfd;
      --accent-dim: #2563a8;
      --ok: #34d399;
      --err: #f87171;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: "Cascadia Code", "Consolas", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.55;
    }
    .wrap {
      max-width: min(960px, 100% - 2rem);
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    .hint code { font-size: 0.8rem; }
    .status {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.show { display: block; }
    .status.ok { background: rgba(52, 211, 153, 0.12); border: 1px solid rgba(52, 211, 153, 0.35); color: #a7f3d0; }
    .status.warn { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.35); color: #fecaca; }
    .status.info { background: rgba(61, 156, 253, 0.1); border: 1px solid rgba(61, 156, 253, 0.3); color: #93c5fd; }
    .code-field { margin-top: 1rem; }
    .code-field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    #seq-content {
      display: block;
      width: 100%;
      min-height: min(50vh, 520px);
      margin: 0;
      padding: 1rem;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.45;
      font-family: var(--mono);
      color: #c9d1d9;
      resize: vertical;
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
    }
    #seq-content:focus {
      outline: 2px solid var(--accent-dim);
      outline-offset: 2px;
    }
    .meta {
      display: grid;
      gap: 0.35rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .meta span { color: var(--text); }
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>post_seq</h1>
    <p class="sub">Load a Pulseq <code>.seq</code> file by passing an <strong>HTTPS URL</strong> in the query string.</p>

    <div class="card">
      <p class="hint">
        Use <code>?url=</code> with a <strong>percent-encoded</strong> URL to your file, e.g.<br />
        <code>https://mrx-org.github.io/post_seq/?url=https%3A%2F%2Fraw.githubusercontent.com%2F…%2Ffile.seq</code>
      </p>

      <div class="status" id="status" role="status"></div>
      <div class="meta" id="meta" hidden></div>
      <div class="code-field" id="codeField" hidden>
        <label for="seq-content">.seq contents</label>
        <textarea id="seq-content" readonly spellcheck="false" wrap="off" rows="24" aria-readonly="true"></textarea>
      </div>
    </div>

    <footer>
      <a href="https://github.com/mrx-org/post_seq">mrx-org/post_seq</a> — public URL:
      <a href="https://mrx-org.github.io/post_seq/">https://mrx-org.github.io/post_seq/</a>
    </footer>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var metaEl = document.getElementById("meta");
      var codeFieldEl = document.getElementById("codeField");
      var seqContentEl = document.getElementById("seq-content");

      function showStatus(cls, html) {
        statusEl.className = "status show " + cls;
        statusEl.innerHTML = html;
      }

      function resetExtra() {
        metaEl.hidden = true;
        codeFieldEl.hidden = true;
        metaEl.innerHTML = "";
        seqContentEl.value = "";
      }

      function applySeqText(text, name, sizeBytes) {
        resetExtra();
        showStatus("ok", "<strong>Loaded</strong> from <code>?url=</code>: <code>" + escapeHtml(name) + "</code> — " + formatBytes(sizeBytes) + ".");
        metaEl.hidden = false;
        metaEl.innerHTML =
          '<div>Source: <span>?url= fetch</span></div>' +
          '<div>Name: <span>' + escapeHtml(name) + "</span></div>" +
          '<div>Size: <span>' + formatBytes(sizeBytes) + "</span></div>";
        seqContentEl.value = String(text);
        codeFieldEl.hidden = false;
      }

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function formatBytes(n) {
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        return (n / (1024 * 1024)).toFixed(1) + " MB";
      }

      function run() {
        var params = new URLSearchParams(window.location.search);
        var fetchUrl = params.get("url");
        if (!fetchUrl || !String(fetchUrl).trim()) {
          showStatus(
            "info",
            "No <code>url</code> query parameter. Add <code>?url=</code> plus your <strong>encoded</strong> HTTPS link to a <code>.seq</code> file (see README)."
          );
          return;
        }

        showStatus("info", "Loading…");
        fetch(fetchUrl, { mode: "cors", credentials: "omit" })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.text();
          })
          .then(function (text) {
            var name = "from-url.seq";
            try {
              var u = new URL(fetchUrl, window.location.href);
              var base = u.pathname.split("/").pop();
              if (base) name = base;
            } catch (e) { /* keep default */ }
            applySeqText(text, name, new Blob([text]).size);
          })
          .catch(function (err) {
            resetExtra();
            showStatus(
              "warn",
              "Could not load <code>?url=</code>: " + escapeHtml(String(err.message || err)) + ". The file URL must be reachable and allow CORS from this origin."
            );
          });
      }

      run();
    })();
  </script>
</body>
</html>
